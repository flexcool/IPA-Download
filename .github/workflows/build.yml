name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Node dependencies
        run: |
          cd NodeProject
          npm install

      - name: Build
        run: |
          xcodebuild -project Pastel.xcodeproj \
                     -target Pastel \
                     -configuration Release \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     MACOSX_DEPLOYMENT_TARGET=15.0 \
                     build

      - name: Package
        run: |
          APP=$(ls -d ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release/Pastel.app 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Pastel.app" -type d 2>/dev/null | head -1)
          fi
          ditto "$APP" Pastel.app
          zip -r Pastel.zip Pastel.app

      - uses: actions/upload-artifact@v4
        with:
          name: Pastel
          path: Pastel.zip
