name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Node dependencies
        run: |
          cd NodeProject
          npm install

      - name: Build
        run: |
          xcodebuild -project Pastel.xcodeproj \
                     -target Pastel \
                     -configuration Release \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Package
        run: |
          ditto build/Release/Pastel.app Pastel.app
          zip -r Pastel.zip Pastel.app

      - uses: actions/upload-artifact@v4
        with:
          name: Pastel
          path: Pastel.zip
